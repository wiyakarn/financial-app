<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการการเงิน</title>
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#1e40af">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #1e40af;
            --secondary: #7c3aed;
            --success: #059669;
            --danger: #dc2626;
            --warning: #d97706;
            --light: #f9fafb;
            --dark: #1f2937;
            --border: #e5e7eb;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
            color: var(--dark);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        h1 {
            font-size: 2.5em;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        .card-value {
            font-size: 2.2em;
            font-weight: bold;
            margin: 15px 0;
        }
        .card-value.success { color: var(--success); }
        .card-value.danger { color: var(--danger); }
        .card-value.warning { color: var(--warning); }
        .card-value.primary { color: var(--primary); }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border);
            flex-wrap: wrap;
        }
        .tab-btn {
            padding: 12px 20px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1em;
            color: #6b7280;
            font-weight: 600;
        }
        .tab-btn.active {
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .summary-item {
            padding: 15px;
            background: var(--light);
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .summary-name { font-weight: 600; }
        .summary-amount { font-size: 1.2em; font-weight: bold; }
        button {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 4px 12px rgba(30, 64, 175, 0.3); }
        .btn-secondary {
            background: var(--light);
            color: var(--dark);
            border: 1px solid var(--border);
        }
        .btn-danger {
            background: var(--danger);
            color: white;
            padding: 6px 12px;
            font-size: 0.9em;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
        }
        .form-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1em;
        }
        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
        }
        thead { background: var(--light); }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 ระบบจัดการการเงิน</h1>
            <p style="color: #6b7280;">จัดการรายรับ รายจ่าย และหนี้สิน</p>
        </header>

        <!-- Summary Dashboard -->
        <div class="card" style="margin-bottom: 30px;">
            <h2 style="margin-bottom: 20px;">📊 สรุป In/Out/Balance</h2>
            <div class="dashboard">
                <div style="text-align: center;">
                    <h3>💵 IN (รายรับ)</h3>
                    <div class="card-value success" id="totalIn">0.00</div>
                </div>
                <div style="text-align: center;">
                    <h3>💸 OUT (รายจ่าย)</h3>
                    <div class="card-value danger" id="totalOut">0.00</div>
                </div>
                <div style="text-align: center;">
                    <h3>💳 BALANCE</h3>
                    <div class="card-value primary" id="totalBalance">0.00</div>
                </div>
            </div>

            <!-- Detail Summary -->
            <div style="margin-top: 30px;">
                <h3 style="margin-bottom: 15px;">📝 รายการ IN:</h3>
                <div id="inSummary" style="margin-bottom: 20px;"></div>

                <h3 style="margin-bottom: 15px;">📝 รายการ OUT:</h3>
                <div id="outSummary"></div>
            </div>
        </div>

        <!-- Buttons -->
        <div style="display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap;">
            <button class="btn-primary" onclick="openAddModal()">➕ เพิ่มรายการ</button>
            <button class="btn-secondary" onclick="exportData()">📥 ส่งออก</button>
            <button class="btn-secondary" onclick="importData()">📤 นำเข้า</button>
            <button class="btn-danger" onclick="clearAllData()">🗑️ ลบทั้งหมด</button>
        </div>

        <!-- Transactions Table -->
        <div class="card">
            <h2 style="margin-bottom: 20px;">📋 รายการทั้งหมด</h2>
            <table>
                <thead>
                    <tr>
                        <th>วันที่</th>
                        <th>ชื่อ</th>
                        <th>ประเภท</th>
                        <th>จำนวน</th>
                        <th>ดำเนินการ</th>
                    </tr>
                </thead>
                <tbody id="transactionList">
                    <tr><td colspan="5" style="text-align: center; color: #9ca3af;">ยังไม่มีรายการ</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal: Add Transaction -->
    <div id="addModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>➕ เพิ่มรายการ</h2>
                <button class="close-btn" onclick="closeAddModal()">&times;</button>
            </div>

            <div class="form-group">
                <label>ชื่อรายการ (เช่น SCB1, แม่):</label>
                <input type="text" id="transName" placeholder="SCB1">
            </div>

            <div class="form-group">
                <label>ประเภท:</label>
                <select id="transType">
                    <option value="">-- เลือก --</option>
                    <option value="income">💵 In (รายรับ)</option>
                    <option value="expense">💸 Out (รายจ่าย)</option>
                    <option value="debt">🏦 Debt (หนี้สิน)</option>
                </select>
            </div>

            <div class="form-group">
                <label>จำนวน (บาท):</label>
                <input type="number" id="transAmount" placeholder="0.00" step="0.01" min="0">
            </div>

            <div class="form-group">
                <label>วันที่:</label>
                <input type="date" id="transDate">
            </div>

            <div class="form-group">
                <label>หมายเหตุ:</label>
                <input type="text" id="transNote" placeholder="เช่น เงินเดือน, ค่าอาหาร">
            </div>

            <div style="display: flex; gap: 10px;">
                <button class="btn-primary" style="flex: 1;" onclick="addTransaction()">✅ บันทึก</button>
                <button class="btn-secondary" style="flex: 1;" onclick="closeAddModal()">❌ ยกเลิก</button>
            </div>
        </div>
    </div>

    <script>
        let transactions = JSON.parse(localStorage.getItem('transactions')) || [];

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('transDate').valueAsDate = new Date();
            updateUI();
            
            // Tab listeners
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                    e.target.classList.add('active');
                    if (e.target.dataset.tab) {
                        document.getElementById(e.target.dataset.tab).classList.add('active');
                    }
                });
            });

            // Close modal on outside click
            window.addEventListener('click', (e) => {
                const modal = document.getElementById('addModal');
                if (e.target === modal) closeAddModal();
            });
        });

        function openAddModal() {
            document.getElementById('addModal').classList.add('active');
        }

        function closeAddModal() {
            document.getElementById('addModal').classList.remove('active');
            document.getElementById('transName').value = '';
            document.getElementById('transType').value = '';
            document.getElementById('transAmount').value = '';
            document.getElementById('transNote').value = '';
        }

        function addTransaction() {
            const name = document.getElementById('transName').value.trim();
            const type = document.getElementById('transType').value;
            const amount = parseFloat(document.getElementById('transAmount').value);
            const date = document.getElementById('transDate').value;
            const note = document.getElementById('transNote').value;

            if (!name || !type || !amount || amount <= 0) {
                alert('⚠️ กรุณากรอกข้อมูลให้ครบ');
                return;
            }

            transactions.push({
                id: Date.now(),
                name, type, amount, date, note,
                createdAt: new Date().toISOString()
            });

            localStorage.setItem('transactions', JSON.stringify(transactions));
            alert('✅ บันทึกสำเร็จ!');
            closeAddModal();
            updateUI();
        }

        function updateUI() {
            // Calculate totals
            const inTotal = transactions.filter(t => t.type === 'income').reduce((s, t) => s + t.amount, 0);
            const outTotal = transactions.filter(t => t.type === 'expense').reduce((s, t) => s + t.amount, 0);
            const debtTotal = transactions.filter(t => t.type === 'debt').reduce((s, t) => s + t.amount, 0);
            const balance = inTotal - outTotal - debtTotal;

            document.getElementById('totalIn').textContent = inTotal.toFixed(2);
            document.getElementById('totalOut').textContent = outTotal.toFixed(2);
            document.getElementById('totalBalance').textContent = balance.toFixed(2);

            // Update summary
            const inSummary = document.getElementById('inSummary');
            const inItems = transactions.filter(t => t.type === 'income');
            inSummary.innerHTML = inItems.length === 0 
                ? '<div style="color: #9ca3af;">ยังไม่มี</div>'
                : inItems.map(t => `
                    <div class="summary-item" style="border-left: 4px solid var(--success);">
                        <span class="summary-name">${t.name}</span>
                        <span class="summary-amount" style="color: var(--success);">+${t.amount.toFixed(2)}</span>
                    </div>
                `).join('');

            const outSummary = document.getElementById('outSummary');
            const outItems = transactions.filter(t => t.type === 'expense');
            outSummary.innerHTML = outItems.length === 0 
                ? '<div style="color: #9ca3af;">ยังไม่มี</div>'
                : outItems.map(t => `
                    <div class="summary-item" style="border-left: 4px solid var(--danger);">
                        <span class="summary-name">${t.name}</span>
                        <span class="summary-amount" style="color: var(--danger);">-${t.amount.toFixed(2)}</span>
                    </div>
                `).join('');

            // Update table
            const tbody = document.getElementById('transactionList');
            tbody.innerHTML = transactions.length === 0
                ? '<tr><td colspan="5" style="text-align: center; color: #9ca3af;">ยังไม่มีรายการ</td></tr>'
                : transactions.sort((a, b) => new Date(b.date) - new Date(a.date)).map(t => `
                    <tr>
                        <td>${new Date(t.date).toLocaleDateString('th-TH')}</td>
                        <td><strong>${t.name}</strong></td>
                        <td>${t.type === 'income' ? '💵' : t.type === 'expense' ? '💸' : '🏦'}</td>
                        <td><strong>${t.type === 'income' ? '+' : '-'}${t.amount.toFixed(2)}</strong></td>
                        <td>
                            <button class="btn-danger" onclick="deleteTransaction(${t.id})">🗑️</button>
                        </td>
                    </tr>
                `).join('');
        }

        function deleteTransaction(id) {
            if (!confirm('ลบรายการนี้?')) return;
            transactions = transactions.filter(t => t.id !== id);
            localStorage.setItem('transactions', JSON.stringify(transactions));
            updateUI();
        }

        function exportData() {
            const data = JSON.stringify(transactions, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `finance-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = (e) => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const imported = JSON.parse(evt.target.result);
                        transactions = [...transactions, ...imported];
                        localStorage.setItem('transactions', JSON.stringify(transactions));
                        updateUI();
                        alert('✅ นำเข้าสำเร็จ!');
                    } catch (err) {
                        alert('❌ ไฟล์ไม่ถูกต้อง');
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function clearAllData() {
            if (!confirm('⚠️ ลบข้อมูลทั้งหมด?')) return;
            transactions = [];
            localStorage.setItem('transactions', JSON.stringify(transactions));
            updateUI();
            alert('✅ ลบแล้ว');
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./service-worker.js').catch(e => console.log('SW:', e));
        }
    </script>
</body>
</html>
